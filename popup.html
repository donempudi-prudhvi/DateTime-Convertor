<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    /* Global Container Setup */
    body {
      width: 360px;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 16px;
      background-color: #f8fafc;
      color: #1e293b;
      box-sizing: border-box;
    }
    
    /* Reusable Structural Card Grid */
    .card {
      background: white;
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.04);
      margin-bottom: 12px;
      border: 1px solid #e2e8f0;
      box-sizing: border-box;
      width: 100%;
    }
    
    .label {
      font-size: 0.75rem;
      color: #64748b;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.7px;
      margin-bottom: 8px;
    }
    
    .time-display {
      font-size: 1.1rem;
      font-weight: 600;
      color: #0f172a;
    }

    /* Fixed Width Row Controls Layout */
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      width: 100%;
      box-sizing: border-box;
    }
    
    /* Fixed Width Constraints for Picklist Layout */
    select {
      flex: 1;
      min-width: 0; /* CRITICAL: Stops select text from expanding card boundary */
      width: 100%;
      height: 40px; 
      padding: 0 10px;
      border-radius: 8px;
      border: 1px solid #cbd5e1;
      background-color: #ffffff;
      font-size: 0.88rem;
      color: #334155;
      outline: none;
      cursor: pointer;
      transition: all 0.2s ease;
      box-sizing: border-box;
    }
    
    select:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }
    
    /* Rigid Dimension Square Star Layout Button */
    .fav-btn {
      flex-shrink: 0; /* CRITICAL: Prevents picklist from compressing star width */
      background: #ffffff;
      border: 1px solid #cbd5e1;
      cursor: pointer;
      width: 40px;  
      height: 40px; 
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      box-sizing: border-box;
      padding: 0;
      margin: 0;
    }
    
    .fav-btn svg {
      width: 20px;
      height: 20px;
      display: block; 
      fill: none;
      stroke: #64748b;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: all 0.2s ease;
    }
    
    .fav-btn:hover {
      background-color: #f8fafc;
      border-color: #94a3b8;
    }

    .fav-btn:hover svg {
      stroke: #475569;
      transform: scale(1.05);
    }
    
    .fav-btn.active {
      background-color: #fffbeb;
      border-color: #fcd34d;
    }

    .fav-btn.active svg {
      fill: #f59e0b;
      stroke: #d97706;
    }
    
    /* Alert Messaging */
    .error-msg {
      font-size: 0.8rem;
      font-weight: 500;
      color: #ef4444;
      margin-top: 10px;
      padding: 8px 12px;
      background-color: #fef2f2;
      border: 1px solid #fee2e2;
      border-radius: 6px;
      display: none;
      box-sizing: border-box;
    }

    /* Favorites Shelf Stack Container */
    .fav-shelf {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 12px;
      width: 100%;
      box-sizing: border-box;
    }
    
    .fav-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #ffffff;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #e2e8f0;
      border-left: 4px solid #f59e0b;
      box-shadow: 0 2px 4px rgba(15, 23, 42, 0.01);
      box-sizing: border-box;
      width: 100%;
    }
    
    .fav-item-left {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }
    
    .fav-item-zone {
      font-size: 0.85rem;
      font-weight: 600;
      color: #475569;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .fav-item-time {
      font-size: 1.1rem;
      font-weight: 700;
      color: #0f172a;
    }

    /* Embedded Inline Delete Cross Button */
    .remove-fav-btn {
      background: none;
      border: none;
      color: #94a3b8;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }
    
    .remove-fav-btn:hover {
      background-color: #f1f5f9;
      color: #ef4444;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="label">Current UTC Time</div>
    <div id="utc-clock" class="time-display">Loading...</div>
  </div>

  <div id="favorites-container" class="fav-shelf"></div>

  <div class="card">
    <div class="label">Select Target Timezone</div>
    <div class="row">
      <select id="timezone-select"></select>
      <button id="fav-btn" class="fav-btn" title="Add/Remove Favorite">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
        </svg>
      </button>
    </div>
    <div id="error-msg" class="error-msg">⚠️ Maximum 5 favorites allowed!</div>
  </div>

  <div class="card" style="border-left: 4px solid #3b82f6;">
    <div class="label" id="target-zone-label">Converted Time</div>
    <div id="target-clock" class="time-display">Loading...</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
