<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    /* Global Container Setup */
    body {
      width: 380px;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 16px;
      background-color: #f8fafc;
      color: #1e293b;
      box-sizing: border-box;
    }
    
    /* Reusable Card Component */
    .card {
      background: white;
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.04);
      margin-bottom: 12px;
      border: 1px solid #e2e8f0;
      box-sizing: border-box;
      width: 100%;
    }
    
    .label {
      font-size: 0.75rem;
      color: #64748b;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.7px;
      margin-bottom: 8px;
    }
    
    .time-display {
      font-size: 1.3rem;
      font-weight: 600;
      color: #0f172a;
    }

    /* Controls Alignment Row */
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      width: 100%;
      box-sizing: border-box;
    }
    
    /* Input Elements Standardized Height & Style */
    select, input[type="datetime-local"] {
      flex: 1;
      min-width: 0; 
      width: 100%;
      height: 40px; 
      padding: 0 8px;
      border-radius: 8px;
      border: 1px solid #cbd5e1;
      background-color: #ffffff;
      font-size: 0.82rem;
      color: #334155;
      outline: none;
      cursor: pointer;
      transition: all 0.2s ease;
      box-sizing: border-box;
    }
    
    select:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }
    
    /* Star Button Styling */
    .fav-btn {
      flex-shrink: 0;
      background: #ffffff;
      border: 1px solid #cbd5e1;
      cursor: pointer;
      width: 40px;  
      height: 40px; 
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      box-sizing: border-box;
      padding: 0;
      margin: 0;
    }
    
    .fav-btn svg {
      width: 20px;
      height: 20px;
      display: block; 
      fill: none;
      stroke: #64748b;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: all 0.2s ease;
    }
    
    .fav-btn:hover {
      background-color: #f8fafc;
      border-color: #94a3b8;
    }
    
    .fav-btn.active {
      background-color: #fffbeb;
      border-color: #fcd34d;
    }

    .fav-btn.active svg {
      fill: #f59e0b;
      stroke: #d97706;
    }
    
    .error-msg {
      font-size: 0.8rem;
      font-weight: 500;
      color: #ef4444;
      margin-top: 10px;
      padding: 8px 12px;
      background-color: #fef2f2;
      border: 1px solid #fee2e2;
      border-radius: 6px;
      display: none;
      box-sizing: border-box;
    }

    /* Favorites Shelf Stack Containers */
    .fav-shelf {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 12px;
      width: 100%;
      box-sizing: border-box;
    }
    
    .fav-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #ffffff;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #e2e8f0;
      border-left: 4px solid #f59e0b;
      box-shadow: 0 2px 4px rgba(15, 23, 42, 0.01);
      box-sizing: border-box;
    }
    
    .fav-item-left {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }
    
    .fav-item-zone {
      font-size: 0.83rem;
      font-weight: 600;
      color: #475569;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .fav-item-time {
      font-size: 1.1rem;
      font-weight: 700;
      color: #0f172a;
    }

    .remove-fav-btn {
      background: none;
      border: none;
      color: #94a3b8;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }
    
    .remove-fav-btn:hover {
      background-color: #f1f5f9;
      color: #ef4444;
    }

 /* Decorative dividing line */
    hr {
      border: 0; 
      border-top: 1px dashed #cbd5e1; 
      margin: 16px 0;
      width: 100%;
    }

    /* Calculator Input Column Container Stack */
    .calc-row {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 8px;
      width: 100%;
      box-sizing: border-box;
    }
    
    /* Enforced styles specifically targeting the calculator elements */
    #calc-input-time,
    #calc-input-zone {
      width: 100%;
      height: 100px; 
      padding: 0 12px;
      border-radius: 8px;
      border: 1px solid #cbd5e1;
      background-color: #ffffff;
      font-family: inherit;
      font-size: 0.95rem;
      color: #334155;
      outline: none;
      cursor: pointer;
      transition: all 0.2s ease-in-out;
      box-sizing: border-box;
    }
    
    #calc-input-time:hover,
    #calc-input-zone:hover {
      border-color: #94a3b8;
    }
    
    #calc-input-time:focus,
    #calc-input-zone:focus {
      border-color: #10b981;
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
    }
    
    /* Native Chrome Calendar Icon styling element tweak */
    input[type="datetime-local"]::-webkit-calendar-picker-indicator {
      cursor: pointer;
      border-radius: 4px;
      padding: 4px;
      filter: invert(40%) sepia(10%) saturate(1000%) hue-rotate(110deg) brightness(95%);
    }
    
    /* Result Display Output Box */
    .calc-result-box {
      margin-top: 12px;
      padding: 12px;
      background-color: #f0fdf4;
      border: 1px solid #dcfce7;
      border-left: 4px solid #10b981;
      border-radius: 8px;
      box-sizing: border-box;
      width: 100%;
    }
    
    .calc-result-text {
      font-size: 1.15rem;
      font-weight: 700;
      color: #166534;
      margin-top: 2px;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="label">Current UTC Time</div>
    <div id="utc-clock" class="time-display">Loading...</div>
  </div>

  <div id="favorites-container" class="fav-shelf"></div>

  <div class="card">
    <div class="label">Select Target Timezone</div>
    <div class="row">
      <select id="timezone-select"></select>
      <button id="fav-btn" class="fav-btn" title="Add/Remove Favorite">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
        </svg>
      </button>
    </div>
    <div id="error-msg" class="error-msg">⚠️ Maximum 5 favorites allowed!</div>
  </div>

  <div class="card" style="border-left: 4px solid #3b82f6;">
    <div class="label" id="target-zone-label">Converted Time</div>
    <div id="target-clock" class="time-display">Loading...</div>
  </div>

  <hr>

  <div class="card" style="border-top: 4px solid #10b981;">
    <div class="label">Custom Time Calculator</div>
    <div class="calc-row">
      <input type="datetime-local" id="calc-input-time">
      <select id="calc-input-zone"></select>
    </div>
    <div class="calc-result-box">
      <div class="label" style="color: #166534; margin-bottom: 2px;">In Your Local Time:</div>
      <div id="calc-output-display" class="calc-result-text">Select input parameters...</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
